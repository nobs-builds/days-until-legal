<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Days Until — Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #FAFAF8;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .emoji { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a.button {
      display: inline-block;
      background: #FF9800;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 0.8rem 2rem;
      border-radius: 999px;
      font-size: 1rem;
    }
    a.button:hover { background: #e68900; }
    .note {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">📅</div>
    <h1>Need help?</h1>
    <p>For questions, bug reports, or feedback, send us an email and we'll get back to you promptly.</p>
    <a class="button" href="mailto:nathanbuildsthings+daysuntil@gmail.com">Email Support</a>
    <p class="note">nathanbuildsthings+daysuntil@gmail.com</p>
  </div>
</body>
</html>
